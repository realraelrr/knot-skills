name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Compile Python scripts
        run: python -m compileall scripts skills

      - name: Canary install
        run: bash tests/canary.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build office-docx CLI
        run: dotnet build skills/office-docx/scripts/dotnet/OfficeDocx.Cli/OfficeDocx.Cli.csproj --configuration Release
